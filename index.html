    <style>
      :root {
        --ink: #122234;
        --muted: #647486;
        --line: #d9e4ec;
        --soft-line: #e7eef3;
        --surface-soft: #f6fafc;
        --navy: #113f5d;
        --navy-dark: #092b43;
        --blue: #0b83b5;
        --amber: #d28a1f;
        --coral: #d85e45;
        --shadow: 0 28px 90px rgba(0, 12, 28, 0.34);
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      }

      * { box-sizing: border-box; }
      html { min-height: 100%; }
      body {
        margin: 0;
        min-height: 100svh;
        color: var(--ink);
        background: #061426;
        letter-spacing: 0;
      }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      h1, h2 { margin: 0; line-height: 1.2; letter-spacing: 0; }
      h1 { font-size: clamp(28px, 3.4vw, 40px); font-weight: 900; }
      h2 { font-size: clamp(21px, 2.4vw, 28px); font-weight: 850; }
      p { line-height: 1.58; }
      .hidden { display: none !important; }

      .poster-page {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        overflow-x: hidden;
      }

      .poster-backdrop,
      .poster-backdrop::before,
      .poster-backdrop::after {
        position: fixed;
        inset: 0;
        z-index: -2;
        content: "";
      }

      .poster-backdrop::before { background: #061426; }
      .poster-backdrop::after {
        background-image:
          linear-gradient(90deg, rgba(3, 13, 28, 0.06) 0%, rgba(3, 13, 28, 0.1) 52%, rgba(3, 13, 28, 0.34) 100%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(1, 10, 24, 0.26) 100%),
          var(--poster-image, linear-gradient(135deg, #dff4ff 0%, #0a6f9d 42%, #061426 100%));
        background-position: center center;
        background-repeat: no-repeat;
        background-size: 100% 100%, 100% 100%, auto 100svh;
      }

      .poster-page::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(1, 10, 24, 0.24));
        pointer-events: none;
      }

      .app-shell {
        width: min(560px, calc(100vw - 80px));
        margin: 0 auto;
        padding: clamp(24px, 2.4vw, 34px);
        max-height: calc(100svh - clamp(64px, 10vh, 128px));
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-width: none;
        -webkit-backdrop-filter: blur(2px) saturate(1.08);
        backdrop-filter: blur(2px) saturate(1.08);
        box-shadow: var(--shadow);
      }
      .app-shell::-webkit-scrollbar { width: 0; height: 0; }

      .survey-in-progress { align-items: flex-start; }
      .survey-in-progress .app-shell {
        margin-top: clamp(18px, 3vh, 32px);
        margin-bottom: clamp(18px, 3vh, 32px);
      }

      .survey-complete .topbar { display: none; }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 24px;
      }
      .eyebrow,
      .section-label {
        margin: 0 0 8px;
        color: #006e98;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .hero-subtitle {
        max-width: 520px;
        margin: 9px 0 0;
        color: var(--muted);
        font-size: 15px;
        font-weight: 650;
      }
      .reward-note {
        margin: 10px 0 0;
        color: #075b7d;
        font-size: 13px;
        font-weight: 800;
        line-height: 1.5;
      }

      .panel, .progress-wrap {
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 0;
      }
      #verificationPanel h2 {
        margin-bottom: 16px;
      }

      .question-description,
      .hint,
      .empty-note,
      .progress-meta {
        color: var(--muted);
        font-size: 14px;
      }
      .question-description,
      .hint,
      .empty-note { margin: 0 0 16px; }

      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        margin: 0 0 12px;
        border-radius: 999px;
        padding: 0 10px;
        background: #eaf8ff;
        color: #00658a;
        font-size: 13px;
        font-weight: 900;
      }

      .inline-control {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }
      textarea,
      input[type="text"] {
        width: 100%;
        min-height: 50px;
        border: 1px solid #cfdbe4;
        border-radius: 8px;
        padding: 13px 14px;
        background: #ffffff;
        color: var(--ink);
        resize: vertical;
      }
      textarea:focus,
      input:focus {
        border-color: var(--blue);
        outline: 3px solid rgba(11, 131, 181, 0.15);
      }
      #employeeIdInput {
        font-size: 17px;
        font-weight: 800;
      }

      .primary-button,
      .secondary-button {
        min-height: 50px;
        border-radius: 8px;
        padding: 0 18px;
        font-weight: 850;
      }
      .primary-button {
        border: 0;
        background: var(--navy);
        color: #ffffff;
      }
      .primary-button:hover { background: var(--navy-dark); }
      .primary-button:disabled,
      .secondary-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }
      .secondary-button {
        border: 1px solid #cfdbe4;
        background: #ffffff;
        color: #25384b;
      }

      .progress-wrap {
        border: 1px solid var(--soft-line);
        border-radius: 8px;
        padding: 14px;
        background: var(--surface-soft);
      }
      .progress-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        font-weight: 850;
      }
      .progress-track {
        height: 9px;
        overflow: hidden;
        border-radius: 999px;
        background: #e2eaf0;
      }
      .progress-track div {
        height: 100%;
        border-radius: inherit;
        background: var(--navy);
        transition: width 0.2s ease;
      }

      .question-panel {
        display: grid;
        gap: 20px;
      }
      .question-card {
        min-height: 260px;
      }
      .question-card h2 {
        max-width: 100%;
        line-height: 1.26;
        overflow-wrap: keep-all;
        word-break: keep-all;
      }
      .answer-area { margin-top: 18px; }
      .other-response { margin-top: 12px; }
      .other-response label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }
      .option-list,
      .matrix-list {
        display: grid;
        gap: 10px;
        align-items: stretch;
      }
      .option-item {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        min-height: 50px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px 14px;
        background: #ffffff;
        font-weight: 750;
        line-height: 1.42;
      }
      .option-item:has(input:checked) {
        border-color: var(--blue);
        background: #effaff;
      }
      .option-item input {
        width: 19px;
        height: 19px;
        margin: 0;
        accent-color: var(--blue);
      }
      .option-item span {
        display: block;
        min-width: 0;
        overflow-wrap: break-word;
      }
      .counter {
        margin: -4px 0 12px;
        color: var(--amber);
        font-size: 13px;
        font-weight: 850;
      }
      .scale-labels {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
      }
      .scale-labels span:last-child { text-align: right; }
      .scale-labels.compact { margin: 8px 0; }
      .scale-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        align-items: stretch;
      }
      .scale-button {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: #26394c;
        font-weight: 900;
        line-height: 1;
      }
      .scale-button.selected {
        border-color: var(--navy);
        background: var(--navy);
        color: #ffffff;
      }
      .matrix-row {
        min-width: 0;
        margin: 0;
        border: 1px solid var(--soft-line);
        border-radius: 8px;
        padding: 14px;
        background: var(--surface-soft);
      }
      .matrix-title {
        display: block;
        width: 100%;
        max-width: 100%;
        margin: 0 0 12px;
        color: #24384c;
        font-weight: 850;
        line-height: 1.45;
        overflow-wrap: break-word;
        word-break: keep-all;
      }
      .matrix-row .scale-labels.compact { margin: 0 0 8px; }
      .matrix-row .scale-row { margin-top: 0; }
      .matrix-row .scale-button { min-height: 42px; }
      .survey-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 0;
      }
      .survey-actions .primary-button,
      .survey-actions .secondary-button {
        width: auto;
        min-width: 112px;
        min-height: 44px;
        padding: 0 22px;
      }
      .error-text {
        min-height: 22px;
        margin: 12px 0 0;
        color: var(--coral);
        font-weight: 850;
      }
      .error-text:empty {
        min-height: 0;
        margin: 0;
      }

      @media (max-width: 760px) {
        .poster-page {
          display: block;
          min-height: 100svh;
          overflow-y: visible;
        }
        .poster-backdrop::after {
          background-image:
            linear-gradient(180deg, rgba(3, 13, 28, 0.04) 0%, rgba(3, 13, 28, 0.18) 46%, rgba(3, 13, 28, 0.8) 100%),
            var(--poster-image, linear-gradient(135deg, #dff4ff 0%, #0a6f9d 42%, #061426 100%));
          background-position: center top;
          background-size: 100% 100%, contain;
        }
        .app-shell {
          width: min(100% - 22px, 620px);
          margin: min(21vh, 190px) auto max(12px, env(safe-area-inset-bottom));
          padding: clamp(14px, 2.2svh, 18px) clamp(16px, 4vw, 22px) clamp(16px, 2.4svh, 20px);
          max-height: none;
          overflow: visible;
        }
        .survey-in-progress .app-shell { margin: 10px auto 12px; }
        h1 { font-size: 26px; }
        h2 { font-size: 22px; }
        #verificationPanel h2 { margin-bottom: 14px; }
        .topbar { margin-bottom: 12px; }
        .hero-subtitle { margin-top: 6px; font-size: 14px; }
        .reward-note { margin-top: 8px; font-size: 12.5px; }
        .question-description, .hint, .empty-note { margin-bottom: 12px; font-size: 13px; }
        .inline-control {
          grid-template-columns: minmax(0, 1fr) 76px;
          gap: 8px;
        }
        .inline-control .primary-button {
          width: auto;
          min-width: 76px;
          padding: 0 12px;
        }
        textarea,
        input[type="text"] {
          min-height: 46px;
          padding: 11px 13px;
        }
        .primary-button,
        .secondary-button { min-height: 46px; }
        .option-list { gap: 8px; }
        .matrix-list { gap: 12px; }
        .option-item {
          grid-template-columns: 18px minmax(0, 1fr);
          gap: 10px;
          min-height: 46px;
          padding: 11px 12px;
          font-size: 14px;
        }
        .option-item input { width: 18px; height: 18px; }
        .scale-labels { gap: 10px; font-size: 12px; }
        .scale-row { gap: 6px; }
        .scale-button { min-height: 44px; }
        .matrix-row { padding: 12px; }
        .matrix-title {
          margin-bottom: 10px;
          font-size: 15px;
          line-height: 1.4;
        }
        .matrix-row .scale-button { min-height: 44px; }
        .question-panel { gap: 18px; }
        .question-card { min-height: auto; }
        .answer-area { margin-top: 16px; }
        .survey-actions {
          justify-content: flex-end;
          gap: 8px;
          margin-top: 2px;
        }
        .primary-button,
        .secondary-button { width: 100%; }
        .survey-actions .primary-button,
        .survey-actions .secondary-button {
          width: auto;
          min-width: 92px;
          min-height: 42px;
          padding: 0 18px;
        }
      }
    </style>

  <body class="poster-page">
    <div class="poster-backdrop" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">2026 INCAR SUMMER FESTIVAL</p>
          <h1>인카 썸머 페스티벌 간단 설문</h1>
          <p class="hero-subtitle">페스티벌에 대해 얼마나 알고 계신지,<br>현재 참여 상황은 어떤지 편하게 답해 주세요.</p>
          <p class="reward-note">설문에 참여해 주신 분 중 500명을 선정해 커피 쿠폰을 보내드립니다.</p>
        </div>
      </header>

      <main>
        <section id="verificationPanel" class="panel">
          <h2>사번을 입력 후 설문을 시작해 주세요</h2>
          <div class="inline-control">
            <input id="employeeIdInput" type="text" inputmode="numeric" autocomplete="off" placeholder="사번">
            <button id="verifyButton" class="primary-button" type="button">다음</button>
          </div>
          <p id="verifyError" class="error-text" role="alert"></p>
        </section>

        <section id="questionPanel" class="question-panel hidden">
          <div class="progress-wrap" aria-hidden="true">
            <div class="progress-meta">
              <span id="progressText">문항 1</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="progress-track"><div id="progressBar"></div></div>
          </div>
          <div id="questionHost" class="panel question-card"></div>
          <div class="survey-actions">
            <button id="prevButton" class="secondary-button" type="button">이전</button>
            <button id="nextButton" class="primary-button" type="button">다음</button>
          </div>
        </section>

        <section id="submittedState" class="panel hidden">
          <p class="status-pill">완료</p>
          <h2>설문이 제출되었습니다</h2>
          <p>참여해 주셔서 감사합니다. 보내주신 의견을 바탕으로 더 나은 ISF를 준비하겠습니다.</p>
        </section>
      </main>
    </div>

          minLabel: "가능성이 매우 낮다",
          maxLabel: "가능성이 매우 높다",
        },
        {
          id: "q_barriers",
          section: "저해 요인",
          type: "single",
          title: "참여를 망설이게 하거나 어렵게 만드는 요인은 무엇입니까?",
          required: true,
          options: barrierOptions,
          otherOption: "기타",
          otherAnswerId: "q_barriers_other",
          otherLabel: "기타 내용",
          otherPlaceholder: "기타 내용을 입력해 주세요.",
          otherRequiredMessage: "기타 내용을 입력해 주세요.",
        },
        {
          id: "q_compare_prev",
          section: "전년 대비",
          type: "matrix",
          title: "전년 대비 올해 프로모션을 어떻게 평가하십니까?",
          description: "전년도 참여 경험이 있는 응답자에게만 표시됩니다.",
          required: true,
          showIf: () => state.answers.q_previous_participation === "참여했다",
          rows: ["전년보다 시상 기준이 이해하기 쉽다", "전년보다 혜택이 매력적이다", "전년보다 목표 달성 가능성이 높다", "전년보다 참여 의욕이 높다"],
          minLabel: "전혀 그렇지 않다",
          maxLabel: "매우 그렇다",
        },
        {
          id: "q_improvements",
          section: "개선 요청",
          type: "single",
          title: "8~9월 참여를 위해 가장 필요한 사항은 무엇입니까?",
          required: true,
          options: ["본인의 목표 구간·현재 실적·남은 달성 금액 안내", "구간별 달성 전략과 영업활동 가이드", "관리자 또는 소속의 정기적인 목표관리·피드백", "추가로 필요한 사항은 없다", "기타"],
          otherOption: "기타",
          otherAnswerId: "q_improvements_other",
          otherLabel: "기타 내용",
          otherPlaceholder: "기타 내용을 입력해 주세요.",
          otherRequiredMessage: "기타 내용을 입력해 주세요.",
        },
        {
          id: "q_comment",
          section: "개선 요청",
          type: "textarea",
          title: "추가로 전달하고 싶은 의견이 있다면 작성해 주세요.",
          required: false,
          placeholder: "선택 입력",
        },
      ];

      const questionOrder = new Map([
        "q_career",
        "q_previous_participation",
        "q_notice_status",
        "q_notice_channels",
        "q_participation_status",
        "q_target_tier",
        "q_motivation",
        "q_feasibility",
        "q_understanding_overall",
        "q_understanding_items",
        "q_period",
        "q_basis",
        "q_tier1",
        "q_tier4",
        "q_barriers",
        "q_compare_prev",
        "q_improvements",
        "q_comment",
      ].map((id, index) => [id, index]));
      questions.sort((left, right) => questionOrder.get(left.id) - questionOrder.get(right.id));

      const state = {
        employeeId: "",
        answers: {},
        currentIndex: 0,
        isEditing: false,
      };

      const $ = (selector) => document.querySelector(selector);

      function initPoster() {
        const posterUrl = APP_CONFIG.posterUrl || EMBEDDED_POSTER_URL;
        if (!posterUrl) return;
        const escaped = String(posterUrl).replace(/"/g, "%22");
        document.documentElement.style.setProperty("--poster-image", `url("${escaped}")`);
      }

      function setVisible(element, visible) {
        if (element) element.classList.toggle("hidden", !visible);
      }

      function scrollToQuestionTop() {
        const shell = $(".app-shell");
        if (shell) shell.scrollTo({ top: 0, behavior: "auto" });
        window.scrollTo({ top: 0, behavior: "auto" });
      }

      function visibleQuestions() {
        const visible = [];
        questions.forEach((question) => {
          if (!question.showIf || question.showIf()) {
            visible.push(question);
            return;
          }
          delete state.answers[question.id];
          if (question.otherAnswerId) delete state.answers[question.otherAnswerId];
        });
        return visible;
      }

      function verifyEmployeeId() {
        const employeeId = $("#employeeIdInput").value.trim();
        $("#verifyError").textContent = "";
        if (!employeeId) {
          $("#verifyError").textContent = "사번을 입력해 주세요.";
          return;
        }
        $("#verifyButton").disabled = true;
        $("#verifyButton").textContent = "확인 중";
        state.employeeId = employeeId;
        state.answers = {};
        state.isEditing = false;
        state.currentIndex = 0;
        document.body.classList.add("survey-in-progress");
        setVisible($("#verificationPanel"), false);
        setVisible($("#questionPanel"), true);
        $("#verifyButton").disabled = false;
        $("#verifyButton").textContent = "다음";
        renderCurrentQuestion();
        scrollToQuestionTop();
      }

      function renderCurrentQuestion() {
        const activeQuestions = visibleQuestions();
        if (state.currentIndex >= activeQuestions.length) state.currentIndex = activeQuestions.length - 1;
        const question = activeQuestions[state.currentIndex];
        const progress = Math.round(((state.currentIndex + 1) / activeQuestions.length) * 100);
        $("#progressText").textContent = `문항 ${state.currentIndex + 1}`;
        $("#progressPercent").textContent = `${progress}%`;
        $("#progressBar").style.width = `${progress}%`;
        $("#prevButton").disabled = state.currentIndex === 0;
        $("#nextButton").textContent = state.currentIndex === activeQuestions.length - 1 ? "제출" : "다음";
        $("#questionHost").innerHTML = `
          <h2>${escapeHtml(question.title)}</h2>
          ${question.description ? `<p class="question-description">${escapeHtml(question.description)}</p>` : ""}
          <div class="answer-area">${renderAnswerControl(question)}</div>
          <p id="questionError" class="error-text" role="alert"></p>
        `;
        bindQuestionEvents(question);
      }

      function renderAnswerControl(question) {
        if (question.type === "single") {
          const options = question.dynamicOptions ? question.dynamicOptions() : question.options;
          const selected = state.answers[question.id];
          return `<div class="option-list">${options.map((option, index) => renderOption(question.id, option, "radio", selected === option, index)).join("")}</div>${renderOtherField(question, selected === question.otherOption)}`;
        }
        if (question.type === "multi") {
          const selected = state.answers[question.id] || [];
          const countText = question.max ? `<p class="counter">${selected.length} / ${question.max} 선택</p>` : "";
          const otherSelected = question.otherOption && selected.includes(question.otherOption);
          return `${countText}<div class="option-list">${question.options.map((option, index) => renderOption(question.id, option, "checkbox", selected.includes(option), index)).join("")}</div>${renderOtherField(question, otherSelected)}`;
        }
        if (question.type === "scale") {
          const value = state.answers[question.id];
          return `
            <div class="scale-labels"><span>${escapeHtml(question.minLabel)}</span><span>${escapeHtml(question.maxLabel)}</span></div>
            <div class="scale-row">
              ${[1, 2, 3, 4, 5].map((score) => `<button class="scale-button ${value === score ? "selected" : ""}" type="button" data-score="${score}">${score}</button>`).join("")}
            </div>
          `;
        }
        if (question.type === "matrix") {
          const values = state.answers[question.id] || {};
          return `<div class="matrix-list">${question.rows.map((row, rowIndex) => `
            <div class="matrix-row" role="group" aria-labelledby="${escapeAttr(`${question.id}-row-${rowIndex}`)}">
              <p class="matrix-title" id="${escapeAttr(`${question.id}-row-${rowIndex}`)}">${escapeHtml(row)}</p>
              <div class="scale-labels compact"><span>${escapeHtml(question.minLabel)}</span><span>${escapeHtml(question.maxLabel)}</span></div>
              <div class="scale-row">
                ${[1, 2, 3, 4, 5].map((score) => `<button class="scale-button ${values[row] === score ? "selected" : ""}" type="button" data-row="${escapeAttr(row)}" data-score="${score}">${score}</button>`).join("")}
              </div>
            </div>
          `).join("")}</div>`;
        }
        if (question.type === "textarea") {
          return `<textarea id="${escapeAttr(question.id)}" rows="7" maxlength="1000" placeholder="${escapeAttr(question.placeholder || "")}">${escapeHtml(state.answers[question.id] || "")}</textarea>`;
        }
        return "";
      }

      function renderOtherField(question, selected) {
        if (!question.otherOption) return "";
        return `
          <div id="${escapeAttr(`${question.id}-other-wrap`)}" class="other-response ${selected ? "" : "hidden"}">
            <label for="${escapeAttr(question.otherAnswerId)}">${escapeHtml(question.otherLabel || "기타 내용")}</label>
            <input id="${escapeAttr(question.otherAnswerId)}" type="text" maxlength="300" placeholder="${escapeAttr(question.otherPlaceholder || "기타 내용을 입력해 주세요.")}" value="${escapeAttr(state.answers[question.otherAnswerId] || "")}">
          </div>
        `;
      }

      function renderOption(name, option, type, checked, index) {
        const id = `${name}-${index}`;
        return `
          <label class="option-item" for="${escapeAttr(id)}">
            <input id="${escapeAttr(id)}" type="${type}" name="${escapeAttr(name)}" value="${escapeAttr(option)}" ${checked ? "checked" : ""}>
            <span>${escapeHtml(option)}</span>
          </label>
        `;
      }

      function bindQuestionEvents(question) {
        if (question.type === "single") {
          const otherInput = question.otherAnswerId ? document.getElementById(question.otherAnswerId) : null;
          document.querySelectorAll(`input[name="${cssEscape(question.id)}"]`).forEach((input) => {
            input.addEventListener("change", () => {
              state.answers[question.id] = input.value;
              if (question.otherOption && question.otherAnswerId) {
                const otherSelected = input.value === question.otherOption;
                setVisible(document.getElementById(`${question.id}-other-wrap`), otherSelected);
                if (!otherSelected) {
                  delete state.answers[question.otherAnswerId];
                  if (otherInput) otherInput.value = "";
                }
              }
              clearError();
            });
          });
          if (otherInput) {
            otherInput.addEventListener("input", () => {
              state.answers[question.otherAnswerId] = otherInput.value.trim();
              clearError();
            });
          }
        }
        if (question.type === "multi") {
          const otherInput = question.otherAnswerId ? document.getElementById(question.otherAnswerId) : null;
          document.querySelectorAll(`input[name="${cssEscape(question.id)}"]`).forEach((input) => {
            input.addEventListener("change", () => {
              const current = new Set(state.answers[question.id] || []);
              const value = input.value;
              const isExclusive = exclusiveMultiOptions.has(value);
              if (input.checked) {
                if (isExclusive) {
                  current.clear();
                  document.querySelectorAll(`input[name="${cssEscape(question.id)}"]`).forEach((other) => {
                    other.checked = other === input;
                  });
                } else {
                  current.forEach((item) => {
                    if (exclusiveMultiOptions.has(item)) current.delete(item);
                  });
                  document.querySelectorAll(`input[name="${cssEscape(question.id)}"]`).forEach((other) => {
                    if (exclusiveMultiOptions.has(other.value)) other.checked = false;
                  });
                  current.add(value);
                }
              } else {
                current.delete(value);
              }
              if (question.max && current.size > question.max) {
                input.checked = false;
                showError(`최대 ${question.max}개까지 선택할 수 있습니다.`);
                return;
              }
              state.answers[question.id] = [...current];
              if (question.otherOption && question.otherAnswerId) {
                const otherSelected = current.has(question.otherOption);
                setVisible(document.getElementById(`${question.id}-other-wrap`), otherSelected);
                if (!otherSelected) {
                  delete state.answers[question.otherAnswerId];
                  if (otherInput) otherInput.value = "";
                }
              }
              updateCounter(question);
              clearError();
            });
          });
          if (otherInput) {
            otherInput.addEventListener("input", () => {
              state.answers[question.otherAnswerId] = otherInput.value.trim();
              clearError();
            });
          }
        }
        if (question.type === "scale") {
          document.querySelectorAll(".scale-button").forEach((button) => {
            button.addEventListener("click", () => {
              state.answers[question.id] = Number(button.dataset.score);
              setSelectedInGroup(button);
              clearError();
            });
          });
        }
        if (question.type === "matrix") {
          document.querySelectorAll(".matrix-row .scale-button").forEach((button) => {
            button.addEventListener("click", () => {
              state.answers[question.id] = {
                ...(state.answers[question.id] || {}),
                [button.dataset.row]: Number(button.dataset.score),
              };
              setSelectedInGroup(button);
              clearError();
            });
          });
        }
        if (question.type === "textarea") {
          const textarea = document.getElementById(question.id);
          textarea.addEventListener("input", () => {
            state.answers[question.id] = textarea.value.trim();
          });
        }
      }

      function updateCounter(question) {
        const counter = $(".counter");
        if (counter && question.max) counter.textContent = `${(state.answers[question.id] || []).length} / ${question.max} 선택`;
      }

      function setSelectedInGroup(button) {
        const row = button.closest(".scale-row");
        if (!row) return;
        row.querySelectorAll(".scale-button").forEach((item) => {
          item.classList.toggle("selected", item === button);
        });
      }

      function validateQuestion(question) {
        if (!question.required) return true;
        const value = state.answers[question.id];
        if (question.type === "single" || question.type === "scale") {
          if (value === undefined || value === "") {
            showError("답변을 선택해 주세요.");
            return false;
          }
          if (question.type === "single" && question.otherOption && value === question.otherOption && !String(state.answers[question.otherAnswerId] || "").trim()) {
            showError(question.otherRequiredMessage || "기타 내용을 입력해 주세요.");
            return false;
          }
        }
        if (question.type === "multi") {
          if (!Array.isArray(value) || value.length === 0) {
            showError("답변을 선택해 주세요.");
            return false;
          }
          if (question.otherOption && value.includes(question.otherOption) && !String(state.answers[question.otherAnswerId] || "").trim()) {
            showError(question.otherRequiredMessage || "기타 내용을 입력해 주세요.");
            return false;
          }
        }
        if (question.type === "matrix") {
          const values = value || {};
          const unanswered = question.rows.filter((row) => values[row] === undefined);
          if (unanswered.length) {
            showError("모든 항목에 답변해 주세요.");
            return false;
          }
        }
        return true;
      }

      function submitSurvey() {
        $("#nextButton").disabled = true;
        $("#nextButton").textContent = "제출 중";

        const requestId = window.crypto && crypto.randomUUID
          ? crypto.randomUUID()
          : `isf-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const frameName = `isfSubmitFrame-${requestId}`;
        const iframe = document.createElement("iframe");
        iframe.name = frameName;
        iframe.className = "hidden";
        iframe.setAttribute("aria-hidden", "true");

        const form = document.createElement("form");
        form.method = "POST";
        form.action = WEBAPP_ENDPOINT;
        form.target = frameName;
        form.className = "hidden";

        const addField = (name, value) => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = name;
          input.value = value;
          form.appendChild(input);
        };
        addField("action", "submit");
        addField("requestId", requestId);
        addField("origin", window.location.origin);
        addField("payload", JSON.stringify({ employeeId: state.employeeId, answers: state.answers }));

        const cleanup = () => {
          window.removeEventListener("message", handleMessage);
          iframe.remove();
          form.remove();
        };
        const showSubmitError = (message) => {
          $("#nextButton").disabled = false;
          $("#nextButton").textContent = "제출";
          showError(message || "제출 중 오류가 발생했습니다.");
        };
        const failTimer = window.setTimeout(() => {
          cleanup();
          showSubmitError("제출 확인이 지연되고 있습니다. 네트워크를 확인한 뒤 다시 시도해 주세요.");
        }, 20000);

        const handleMessage = (event) => {
          let sender;
          try {
            sender = new URL(event.origin);
          } catch (error) {
            return;
          }
          if (sender.protocol !== "https:" || !sender.hostname.endsWith(".googleusercontent.com")) return;
          let message = event.data;
          if (typeof message === "string") {
            try {
              message = JSON.parse(message);
            } catch (error) {
              return;
            }
          }
          if (!message || message.source !== "isf-api" || message.requestId !== requestId) return;
          window.clearTimeout(failTimer);
          cleanup();
          const result = message.result || {};
          if (result && result.ok === false) {
            showSubmitError(result.error);
            return;
          }
          document.body.classList.remove("survey-in-progress");
          document.body.classList.add("survey-complete");
          setVisible($("#questionPanel"), false);
          setVisible($("#submittedState"), true);
          $("#submittedState h2").textContent = state.isEditing ? "응답이 수정되었습니다" : "설문이 제출되었습니다";
        };

        window.addEventListener("message", handleMessage);
        document.body.appendChild(iframe);
        document.body.appendChild(form);
        form.submit();
      }

      function showError(message) {
        const target = $("#questionError");
        if (target) target.textContent = message;
      }

      function clearError() {
        const target = $("#questionError");
        if (target) target.textContent = "";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      function cssEscape(value) {
        if (window.CSS && CSS.escape) return CSS.escape(value);
        return String(value).replace(/"/g, '\\"');
      }

      $("#verifyButton").addEventListener("click", verifyEmployeeId);
      $("#employeeIdInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          verifyEmployeeId();
        }
      });
      $("#prevButton").addEventListener("click", () => {
        state.currentIndex = Math.max(0, state.currentIndex - 1);
        renderCurrentQuestion();
        scrollToQuestionTop();
      });
      $("#nextButton").addEventListener("click", () => {
        const activeQuestions = visibleQuestions();
        const question = activeQuestions[state.currentIndex];
        if (!validateQuestion(question)) return;
        if (state.currentIndex === activeQuestions.length - 1) {
          submitSurvey();
          return;
        }
        state.currentIndex += 1;
        renderCurrentQuestion();
        scrollToQuestionTop();
      });

      initPoster();
    </script>
  </body>
</html>
